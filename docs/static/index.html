    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --black: #151820;
        --darkgrey: #252830;
        --darkergrey: color-mix(in srgb, var(--black), var(--darkgrey) 50%);
        --grey: #454850;
        --lightgrey: #656870;
        --lightergrey: color-mix(in srgb, var(--white), var(--lightgrey) 60%);
        --white: #bdc3c7;
        --red: #c0392b;
        --orange: #d35400;
        --yellow: #f1c40f;
        --green: #2ecc71;
        --blue: #0984e3;
        --purple: #8e44ad;

        --vine: #46c676;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        background: var(--black);
        width: 100svw;
        height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Roboto", sans-serif;
      }
      img {
        height: 384px;
        max-height: 100%;
        max-width: 100%;
        object-fit: contain;
      }

      h1 {
        font-family: "Roboto", sans-serif;
        font-weight: 400;
        font-size: 2.5rem;
        margin-top: 0;
        color: var(--white);
        animation: title 1.5s cubic-bezier(0.17, 0.84, 0.44, 1) 4.2s 1 normal
          backwards;
      }

      @keyframes title {
        from {
          opacity: 0;
          scale: 0.9;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        user-select: none;
      }

      .contact {
        background: #252830;
        max-width: calc(100% - 2em);
        width: 20em;
        height: 4em;
        padding: 0.75em;
        margin: 0.5em;
        display: flex;
        flex-direction: row;
        align-items: center;
        transition: scale 0.2s, color 0.2s;
        border-radius: 100px;
      }

      .contact:hover {
        scale: 1.05;
        color: var(--vine);
      }

      .title {
        font-size: 5em;
        padding: 0.1em;
      }

      span.icon {
        font-size: 2.5em;
        aspect-ratio: 1;
        height: 100%;
        max-height: 100%;
        margin-right: -1.25rem;
      }

      span.icon > svg {
        max-height: 100%;
      }

      div.value {
        flex: 1 0;
        font-size: 1.5em;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
      }

      span.mail {
        font-size: 0.75em;
      }

      a {
        color: var(--white);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>The Vine Programming Language</h1>
    <img id="img" src="./logo.svg" />
    <a class="contact" href="./docs/" draggable="false">

      <div class="value">Docs</div>
    </a>
