- send:
    id: 1
    method: initialize
    params:
      capabilities: {}
      processId: null
      rootUri: null
  recv:
    id: 1
    result:
      capabilities:
        definitionProvider: true
        documentFormattingProvider: true
        documentHighlightProvider: true
        documentSymbolProvider: true
        hoverProvider: true
        positionEncoding: utf-16
        referencesProvider: true
        textDocumentSync: 1
        workspace:
          workspaceFolders:
            changeNotifications: true
            supported: true
        workspaceSymbolProvider: true
- send:
    method: initialized
    params: {}
- wait:
    method: textDocument/publishDiagnostics
    params:
      diagnostics: []
      uri: file://<root>/prelude.vi
- write:
    main.vi: 'pub fn main (&io: &IO) {}'
- send:
    method: textDocument/didOpen
    params:
      textDocument:
        uri: file://<tmp>/main.vi
        lanuageId: vine
        version: 1
        text: ''
- send:
    method: textDocument/didSave
    params:
      textDocument:
        uri: file://<tmp>/main.vi
- wait:
    method: textDocument/publishDiagnostics
    params:
      diagnostics:
      - message: unused variable
        range:
          end:
            character: 16
            line: 0
          start:
            character: 14
            line: 0
        severity: 2
        source: vine
      uri: file://<tmp>/main.vi
