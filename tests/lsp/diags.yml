- send:
    id: 1
    method: initialize
    params:
      capabilities: {}
      processId: null
      rootUri: null
  recv:
    id: 1
- send:
    method: initialized
    params: {}
- wait:
    method: textDocument/publishDiagnostics
    params:
      uri: file://<tmp>/empty.vi
- write:
    main.vi: 'pub fn main (&io: &IO) {}'
- send:
    method: textDocument/didSave
    params:
      textDocument:
        uri: file://<tmp>/main.vi
- wait:
    method: textDocument/publishDiagnostics
    params:
      uri: file://<tmp>/main.vi
