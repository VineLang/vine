- send:
    id: 1
    method: initialize
    params:
      capabilities: {}
      processId: null
      rootUri: null
  recv:
    id: 1
- send:
    method: initialized
    params: {}
- wait:
    method: textDocument/publishDiagnostics
    params:
      diagnostics: []
      uri: file://<tmp>/empty.vi
- send:
    id: 2
    method: textDocument/hover
    params:
      textDocument:
        uri: file://<root>/root.vi
      position:
        line: 2
        character: 0
  recv:
    id: 2
